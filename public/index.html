<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎵 Music Player</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}


body{

background:#121212;
color:white;
padding:20px;

}


h1{

text-align:center;
color:#1db954;
margin-bottom:20px;

}


.search{

display:flex;
gap:10px;
justify-content:center;
}


input{

width:70%;
padding:12px;
border-radius:10px;
border:none;

}



button{

background:#1db954;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;

}



#lista{

margin-top:25px;

display:grid;

gap:15px;

}



.card{

background:#222;
padding:15px;
border-radius:15px;

}



audio,video{

width:100%;
margin-top:10px;

}


.player{

position:fixed;

bottom:0;
left:0;

width:100%;

background:#000;

padding:15px;

text-align:center;

}



</style>

</head>


<body>


<h1>🎵 Meu Player</h1>



<div class="search">


<input id="busca"
placeholder="Pesquisar artista ou música">


<button onclick="pesquisar()">

🔎

</button>


</div>




<div id="lista">


<div class="card">

🎤 Matuê

<br>

<button onclick="tocarExemplo()">

▶️ Escutar

</button>


</div>


<div class="card">

🎤 Teto

<br>

<button>

▶️ Escutar

</button>


</div>



<div class="card">

🎤 WIU

<br>

<button>

▶️ Escutar

</button>


</div>


</div>





<div class="player">


<div id="titulo">

Nenhuma música

</div>


<audio id="audio" controls></audio>


<br>


<button onclick="anterior()">
⏮️
</button>


<button onclick="proxima()">
⏭️
</button>


</div>



<script src="/script.js"></script>


</body>

</html>
