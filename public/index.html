<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎵 Meu Player</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}


body{

background:#121212;
color:white;
padding:20px;
padding-bottom:150px;

}


h1{

text-align:center;
color:#1db954;
margin-bottom:20px;

}



.search{

display:flex;
gap:10px;

}



input{

flex:1;
padding:12px;
border:none;
border-radius:10px;

}



button{

background:#1db954;
color:white;
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;

}



#lista{

margin-top:20px;
display:grid;
gap:15px;

}



.card{

background:#222;
padding:15px;
border-radius:15px;

}



.player{

position:fixed;
bottom:0;
left:0;

width:100%;

background:#000;

padding:15px;

text-align:center;

}



audio{

width:90%;

}

</style>


</head>


<body>


<h1>🎵 Meu Player</h1>



<div class="search">


<input 
id="busca"
placeholder="Nome cantor ou link YouTube">



<button onclick="pesquisar()">

🔎

</button>


</div>




<div id="lista"></div>





<div class="player">


<div id="titulo">

Nenhuma música

</div>


<audio id="audio" controls></audio>


<br>


<button onclick="anterior()">

⏮️

</button>


<button onclick="proxima()">

</button>


</div>



<script src="/script.js"></script>

</html>
